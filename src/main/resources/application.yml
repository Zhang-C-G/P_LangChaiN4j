server:
  port: 8080

spring:
  application:
    name: interview-assistant
  datasource:
    url: jdbc:h2:mem:interview_assistant;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  ai:
    provider: rule
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: gpt-4o-mini
      temperature: 0.3
  security:
    jwt:
      # Base64("interview-assistant-demo-jwt-secret-key-2026")
      secret-base64: aW50ZXJ2aWV3LWFzc2lzdGFudC1kZW1vLWp3dC1zZWNyZXQta2V5LTIwMjY=
      expiration-seconds: 3600
    demo-user:
      username: admin
      password: admin123
